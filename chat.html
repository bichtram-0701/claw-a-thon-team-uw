<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funnel Agent - Team UW</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<style>
  :root {
    --bg:#070a0f;
    --bg2:#0c1118;
    --panel:#111720;
    --panel2:#151c27;
    --border:#263241;
    --border2:#354357;
    --text:#eef4fb;
    --dim:#8b98aa;
    --muted:#657387;
    --accent:#7c3aed;
    --accent2:#22c55e;
    --user:#6d28d9;
    --shadow:0 24px 90px rgba(0,0,0,.42);
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    min-height: 100vh;
    background:
      radial-gradient(circle at top left, rgba(124,58,237,.20), transparent 34rem),
      radial-gradient(circle at bottom right, rgba(34,197,94,.11), transparent 34rem),
      linear-gradient(180deg, var(--bg), var(--bg2));
    color: var(--text);
    font: 15px/1.55 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    padding: 14px 24px;
    border-bottom: 1px solid rgba(255,255,255,.06);
    background: rgba(8,11,16,.70);
    backdrop-filter: blur(18px);
  }
  .brand { max-width: 1180px; margin: 0 auto; display:flex; align-items:center; justify-content:space-between; gap:16px; }
  header h1 { font-size: 17px; letter-spacing:.1px; display:flex; align-items:center; gap:9px; flex-wrap:wrap; font-weight:720; }
  .logo { width:24px; height:24px; display:inline-grid; place-items:center; border-radius:9px; background:linear-gradient(135deg, rgba(124,58,237,.35), rgba(34,197,94,.20)); box-shadow: inset 0 0 0 1px rgba(255,255,255,.10); }
  .version-badge { color: #cbd5e1; background:rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.10); border-radius: 999px; padding: 2px 8px; font-size: 11px; font-weight: 600; }
  .header-actions { display:flex; align-items:center; gap:10px; color: var(--dim); font-size: 12px; }
  .ghost-btn { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.09); color:#cbd5e1; border-radius:999px; padding:7px 11px; font-size:12px; cursor:pointer; }
  .ghost-btn:hover { border-color:rgba(124,58,237,.65); color:#fff; background:rgba(124,58,237,.13); }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: min(1180px, 100%);
    margin: 0 auto;
  }
  .msg { max-width: min(980px, 92%); padding: 12px 15px; border-radius: 16px; white-space: normal; word-wrap: break-word; overflow:hidden; box-shadow: 0 1px 0 rgba(255,255,255,.03); }
  .msg.user { background: linear-gradient(135deg, var(--user), #4f46e5); align-self: flex-end; border-bottom-right-radius: 6px; color:#fff; }
  .msg.bot  { background: rgba(17,23,32,.86); border: 1px solid rgba(255,255,255,.08); align-self: flex-start; border-bottom-left-radius: 6px; }
  .msg.bot .meta { color: var(--muted); font-size: 11px; margin-bottom: 6px; letter-spacing:.02em; }
  .msg.bot.thinking { color: var(--dim); font-style: italic; }
  .msg.bot.error { border-color: rgba(248,81,73,.7); color: #ffb4ae; }
  .msg a { color:#a78bfa; }
  .msg h1,.msg h2,.msg h3 { margin: 10px 0 6px; font-size: 1.05em; }
  .msg ul { margin: 6px 0 6px 20px; }
  .msg blockquote { border-left:3px solid rgba(124,58,237,.75); padding-left:10px; color:#d9e2ef; margin:6px 0; }
  .msg pre { background:#070a0f; border:1px solid rgba(255,255,255,.06); border-radius:10px; padding:10px; overflow-x:auto; }
  .msg code { background:#070a0f; border:1px solid rgba(255,255,255,.06); border-radius:6px; padding:1px 6px; font-size: 13px; overflow-wrap:anywhere; }
  .table-scroll { max-width:100%; overflow-x:auto; margin: 8px 0; border-radius:12px; border:1px solid rgba(255,255,255,.08); }
  .table-scroll table { border:0; margin:0; width:max-content; min-width:100%; }
  .msg table { border-collapse: separate; border-spacing:0; margin: 8px 0; overflow:hidden; border-radius:10px; border:1px solid rgba(255,255,255,.08); }
  .msg td,.msg th { border-bottom:1px solid rgba(255,255,255,.07); border-right:1px solid rgba(255,255,255,.05); padding:6px 10px; font-size:13px; white-space:nowrap; }
  .msg th { background: rgba(255,255,255,.035); color:#f8fafc; font-weight:650; }
  .welcome-card { padding: 16px; background: linear-gradient(180deg, rgba(17,23,32,.92), rgba(15,20,29,.86)); border:1px solid rgba(255,255,255,.09); border-radius:18px; box-shadow:var(--shadow); }
  .welcome-eyebrow { color:#c4b5fd; font-size:12px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; margin-bottom:6px; }
  .welcome-title { font-size:18px; font-weight:760; margin-bottom:5px; }
  .welcome-copy { color:#cbd5e1; max-width:760px; }
  .principles { display:grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap:10px; margin:14px 0; }
  .principle { border:1px solid rgba(255,255,255,.08); background:rgba(255,255,255,.035); border-radius:14px; padding:10px; }
  .principle strong { display:block; font-size:13px; margin-bottom:3px; }
  .principle span { color:#9ca9bb; font-size:12px; }
  .welcome-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
  .composer-wrap {
    position: relative;
    border-top: 1px solid rgba(255,255,255,.06);
    background: rgba(8,11,16,.78);
    backdrop-filter: blur(18px);
  }
  .demo-bar { width:min(1180px, 100%); margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:10px; padding: 10px 24px 0; color:var(--muted); font-size:12px; }
  .demo-panel { width:min(1180px, calc(100% - 48px)); margin: 10px auto 0; padding: 12px; border:1px solid rgba(255,255,255,.09); background:rgba(17,23,32,.95); border-radius:16px; box-shadow:var(--shadow); }
  .demo-panel[hidden] { display:none; }
  .demo-grid { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:8px; }
  .demo-prompt { background: rgba(255,255,255,.035); border:1px solid rgba(255,255,255,.07); color:#dbeafe; border-radius:12px; padding:9px 10px; text-align:left; cursor:pointer; font-size:12.5px; }
  .demo-prompt:hover { background:rgba(124,58,237,.16); border-color:rgba(124,58,237,.55); color:#fff; }
  form { display: flex; gap: 10px; padding: 12px 24px 14px; width:min(1180px, 100%); margin:0 auto; }
  input {
    flex: 1;
    background: rgba(17,23,32,.9);
    border: 1px solid rgba(255,255,255,.10);
    color: var(--text);
    padding: 11px 14px;
    border-radius: 12px;
    font-size: 15px;
    outline: none;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
  }
  input:focus { border-color: rgba(124,58,237,.70); box-shadow: 0 0 0 3px rgba(124,58,237,.16); }
  button { background: linear-gradient(135deg, #7c3aed, #2563eb); border: 0; color: #fff; padding: 10px 18px; border-radius: 12px; font-size: 14px; font-weight: 650; cursor: pointer; }
  button:disabled { opacity: .5; cursor:not-allowed; }
  .command-menu {
    position: absolute;
    left: max(24px, calc((100vw - 1180px) / 2 + 24px));
    bottom: 72px;
    width: min(650px, calc(100vw - 48px));
    background: rgba(17,23,32,.98);
    border: 1px solid rgba(255,255,255,.11);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 8px;
    z-index: 30;
  }
  .command-menu[hidden] { display:none; }
  .command-title { color:var(--muted); font-size:11px; padding: 6px 8px 8px; text-transform:uppercase; letter-spacing:.08em; }
  .command-item { display:grid; grid-template-columns: 118px 1fr; gap:10px; padding:10px 11px; border-radius:12px; cursor:pointer; align-items:start; }
  .command-item:hover, .command-item.active { background: rgba(124,58,237,.15); }
  .command-name { font-weight:700; color:#f8fafc; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size:13px; }
  .command-desc { color:#a6b1c2; font-size:13px; }
  footer { text-align: center; color: var(--muted); font-size: 11px; padding: 7px 6px 8px; }
  @media (max-width: 760px) {
    .header-actions span { display:none; }
    .msg { max-width: 96%; }
    .principles { grid-template-columns: 1fr; }
    .demo-grid { grid-template-columns: 1fr; }
    button { padding:10px 14px; }
    .command-item { grid-template-columns: 1fr; gap:3px; }
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <h1><span class="logo">🛰️</span> Funnel Agent <small class="version-badge">UI v18</small></h1>
    <div class="header-actions"><button class="ghost-btn" id="header-demo" type="button">Demo script</button><span>Press <strong>/</strong> for commands</span></div>
  </div>
</header>

<div id="chat"></div>

<div class="composer-wrap">
  <div id="command-menu" class="command-menu" hidden></div>
  <div class="demo-bar">
    <button class="ghost-btn" id="demo-toggle" type="button">Demo script</button>
    <span>Use <code>/help</code> for context, workflow principles, and extra feature prompts.</span>
  </div>
  <div id="demo-panel" class="demo-panel" hidden></div>
  <form id="form">
    <input id="input" placeholder="Type / for commands, or ask about the funnel…" autocomplete="off" autofocus>
    <button id="send">Send</button>
  </form>
</div>
<footer>Powered by GreenNode AgentBase + MaaS.</footer>

<script>
// Same-origin when served by the agent itself; absolute URL when opened as a local file.
const UI_VERSION = "v18";
const ENDPOINT = location.protocol.startsWith("http")
  ? "/invocations"
  : "https://endpoint-2f37c067-4516-4483-ba07-2199f07abb90.agentbase-runtime.aiplatform.vngcloud.vn/invocations";
const COMMANDS = [
  { cmd: "/metrics", desc: "Funnel KPIs, top risk, MoM, drop reasons, daily volume" },
  { cmd: "/jira", desc: "Stage ownership, blockers, open work, create/update recovery tasks" },
  { cmd: "/confluence", desc: "Weekly readout, meeting summary, publish to Confluence" },
  { cmd: "/teams", desc: "Post off-track blockers and Jira digests to Teams" },
  { cmd: "/model", desc: "Show app version, model, routing mode, and write mode" },
  { cmd: "/help", desc: "Context, workflow principles, and additional feature prompts" }
];
const DEMO_PROMPTS = [
  "/metrics show me the funnel metrics",
  "/metrics why is approval the top risk?",
  "/metrics break May approval drop down by reason",
  "/jira explain stage ownership structure",
  "/jira flag the drops and assign owners to investigate",
  "/jira what is critical or off track right now?",
  "/jira what does blocked mean here and what is it blocking?",
  "/confluence weekly meeting summary",
  "/confluence publish weekly meeting summary to Confluence",
  "/teams post off-track blockers"
];
const chat = document.getElementById("chat"), form = document.getElementById("form"),
      input = document.getElementById("input"), send = document.getElementById("send"),
      commandMenu = document.getElementById("command-menu"), demoPanel = document.getElementById("demo-panel");
let busy = false;

function wrapTables(container) {
  container.querySelectorAll("table").forEach(table => {
    if (table.parentElement && table.parentElement.classList.contains("table-scroll")) return;
    const wrap = document.createElement("div");
    wrap.className = "table-scroll";
    table.parentNode.insertBefore(wrap, table);
    wrap.appendChild(table);
  });
}

function renderMarkdown(md) {
  const tpl = document.createElement("template");
  tpl.innerHTML = marked.parse(String(md ?? ""));
  wrapTables(tpl.content);
  return tpl.innerHTML;
}

function add(cls, html) {
  const d = document.createElement("div");
  d.className = "msg " + cls; d.innerHTML = html;
  chat.appendChild(d); chat.scrollTop = chat.scrollHeight;
  return d;
}
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function renderCommandMenu() {
  const raw = input.value;
  if (!raw.startsWith("/") || raw.includes(" ")) { commandMenu.hidden = true; return; }
  const filter = raw.toLowerCase();
  const matches = COMMANDS.filter(c => c.cmd.startsWith(filter) || filter === "/");
  if (!matches.length) { commandMenu.hidden = true; return; }
  commandMenu.innerHTML = '<div class="command-title">Available commands</div>' + matches.map(c =>
    `<div class="command-item" data-cmd="${esc(c.cmd)}"><div class="command-name">${esc(c.cmd)}</div><div class="command-desc">${esc(c.desc)}</div></div>`
  ).join("");
  commandMenu.hidden = false;
}

function hideCommandMenu() { commandMenu.hidden = true; }
function runPrompt(prompt) { input.value = prompt; form.requestSubmit(); }

function renderDemoPanel() {
  demoPanel.innerHTML = '<div class="command-title">Main demo flow</div><div class="demo-grid">' +
    DEMO_PROMPTS.map((p, i) => `<button type="button" class="demo-prompt" data-prompt="${esc(p)}">${i + 1}. ${esc(p)}</button>`).join("") +
    '</div>';
}
function toggleDemoPanel() { demoPanel.hidden = !demoPanel.hidden; if (!demoPanel.hidden) renderDemoPanel(); }

commandMenu.addEventListener("mousedown", e => {
  const item = e.target.closest(".command-item");
  if (!item) return;
  e.preventDefault();
  input.value = item.dataset.cmd + " ";
  hideCommandMenu();
  input.focus();
});

demoPanel.addEventListener("click", e => {
  const item = e.target.closest(".demo-prompt");
  if (!item) return;
  runPrompt(item.dataset.prompt);
});
document.getElementById("demo-toggle").addEventListener("click", toggleDemoPanel);
document.getElementById("header-demo").addEventListener("click", toggleDemoPanel);

input.addEventListener("input", renderCommandMenu);
input.addEventListener("keydown", e => {
  if (e.key === "Escape") hideCommandMenu();
  if (e.key === "/" && input.selectionStart === 0 && input.selectionEnd === input.value.length) {
    setTimeout(renderCommandMenu, 0);
  }
});
document.addEventListener("click", e => {
  if (!commandMenu.contains(e.target) && e.target !== input) hideCommandMenu();
});

add("bot", `<div class="welcome-card">
  <div class="welcome-eyebrow">Execution agent for business funnels</div>
  <div class="welcome-title">Turn funnel drift into owned recovery work.</div>
  <p class="welcome-copy">Funnel Agent connects metric drift, Jira ownership, Confluence meeting memory, and Teams notifications. It follows the loop: <strong>Detect → Diagnose → Assign → Summarize → Notify</strong>.</p>
  <div class="principles">
    <div class="principle"><strong>Jira</strong><span>Epic → stage owner → task assignee. Missing assignee defaults to the stage owner.</span></div>
    <div class="principle"><strong>Confluence</strong><span>Weekly review pages capture decisions, blockers, and recovery agenda.</span></div>
    <div class="principle"><strong>Teams</strong><span>Posts blockers, due-soon reminders, and task-change notifications.</span></div>
  </div>
  <div class="welcome-actions"><button class="ghost-btn" type="button" onclick="runPrompt('/help')">What can it do?</button><button class="ghost-btn" type="button" onclick="toggleDemoPanel()">Open demo script</button></div>
</div>`);

form.addEventListener("submit", async e => {
  e.preventDefault();
  if (busy) return;
  const q = input.value.trim(); if (!q) return;
  busy = true;
  hideCommandMenu();
  add("user", esc(q)); input.value = ""; send.disabled = true;
  const wait = add("bot thinking", "analyzing…");
  try {
    const t0 = Date.now();
    const res = await fetch(ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: q })
    });
    const data = await res.json().catch(() => ({}));
    const secs = ((Date.now() - t0) / 1000).toFixed(1);
    wait.remove();
    const text = data.answer || data.error ||
      ("```json\n" + JSON.stringify(data, null, 2) + "\n```");
    const label = data.intent || data.status || (res.ok ? "agent" : "error " + res.status);
    const build = data.app_version ? `${data.app_version} · build ${data.version || "?"}` : `v${data.version || "?"}`;
    const meta = `<div class="meta">${esc(label)} · ${secs}s · ${esc(build)}</div>`;
    add(res.ok ? "bot" : "bot error", meta + renderMarkdown(String(text)));
  } catch (err) {
    wait.remove();
    add("bot error", "Could not reach the agent (" + esc(err.message) + "). " +
      "If this page is opened in a browser and the error mentions CORS/network, the endpoint " +
      "may not allow browser calls yet — use chat.bat meanwhile.");
  } finally { busy = false; send.disabled = false; input.focus(); }
});
</script>
</body>
</html>
