# Populate the free Atlassian workspace with the synthetic funnel initiatives.
# Run manually: Actions > "Seed Atlassian workspace" > Run workflow.
#   reset = true  (default): wipe existing issues/pages first, then seed fresh.
#   reset = false: additive — existing issues/pages with the same title are skipped.

name: Seed Atlassian workspace

on:
  workflow_dispatch:
    inputs:
      reset:
        description: "Wipe the workspace before seeding (replace, not append)"
        type: boolean
        default: true

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install httpx
      - name: Seed
        env:
          ATLASSIAN_SITE: ${{ secrets.ATLASSIAN_SITE }}
          ATLASSIAN_EMAIL: ${{ secrets.ATLASSIAN_EMAIL }}
          ATLASSIAN_TOKEN: ${{ secrets.ATLASSIAN_TOKEN }}
          JIRA_PROJECT_KEY: ${{ vars.JIRA_PROJECT_KEY || 'UW' }}
          CONFLUENCE_SPACE_KEY: ${{ vars.CONFLUENCE_SPACE_KEY || '' }}
          SEED_RESET: ${{ inputs.reset && '1' || '0' }}
        run: python scripts/seed_atlassian.py
