# Daily LM digest — the "task reminder for the business lead".
#
# Each weekday morning this calls the live Funnel Watchtower agent for its
# oversight read (what's critical / off track, who owns what) and writes it to
# the workflow run summary. Because our dev sandbox can't reach vngcloud.vn,
# GitHub's runners do the call — same pattern as deploy/debug/seed.
#
# Where to read it: Actions > "LM funnel digest" > latest run > Summary.
# (To deliver it elsewhere — email/Slack/Teams — add a step after "Compose".)

name: LM funnel digest

on:
  schedule:
    - cron: "0 1 * * 1-5"   # 08:00 Asia/Ho_Chi_Minh (UTC+7), Mon–Fri
  workflow_dispatch: {}

env:
  RUNTIME_NAME: funnel-watchtower
  IAM_TOKEN_URL: https://iam.api.vngcloud.vn/accounts-api/v2/auth/token
  RUNTIME_API: https://agentbase.api.vngcloud.vn/runtime
  QUESTION: "Give me today's funnel oversight: what is critical or off track right now, who owns it, and a one-line read per funnel stage."

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Get IAM token
        id: token
        run: |
          TOKEN=$(curl -sf -X POST "$IAM_TOKEN_URL" \
            -u "${{ secrets.GREENNODE_CLIENT_ID }}:${{ secrets.GREENNODE_CLIENT_SECRET }}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" | jq -r '.access_token')
          [ -n "$TOKEN" ] && [ "$TOKEN" != "null" ] || { echo "::error::No IAM token — check GREENNODE_CLIENT_ID/SECRET."; exit 1; }
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Resolve endpoint
        id: ep
        run: |
          AUTH="Authorization: Bearer ${{ steps.token.outputs.token }}"
          ID=$(curl -sf -H "$AUTH" "$RUNTIME_API/agent-runtimes?page=1&size=50" \
            | jq -r --arg n "$RUNTIME_NAME" '.listData[]? | select(.name == $n) | .id' | head -1)
          [ -n "$ID" ] || { echo "::error::Runtime '$RUNTIME_NAME' not found."; exit 1; }
          URL=$(curl -sf -H "$AUTH" "$RUNTIME_API/agent-runtimes/$ID/endpoints" \
            | jq -r '.listData[]? // .[]? | select(.url) | .url' | head -1)
          [ -n "$URL" ] || { echo "::error::No endpoint URL for runtime $ID."; exit 1; }
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Ask the agent for the digest
        id: ask
        run: |
          HTTP=$(curl -s -m 90 -o /tmp/resp.json -w "%{http_code}" \
            -X POST "${{ steps.ep.outputs.url }}/invocations" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg m "$QUESTION" '{message: $m}')")
          echo "HTTP $HTTP"
          [ "$HTTP" = "200" ] || { echo "::error::Agent returned HTTP $HTTP"; head -c 500 /tmp/resp.json; exit 1; }

      - name: Compose digest
        run: |
          ANSWER=$(jq -r '.answer // "(no answer field — raw result below)"' /tmp/resp.json)
          INTENT=$(jq -r '.intent // "?"' /tmp/resp.json)
          VERSION=$(jq -r '.version // "?"' /tmp/resp.json)
          {
            echo "# 🛰️ Funnel Watchtower — LM digest"
            echo "_$(date -u '+%Y-%m-%d %H:%M UTC') · intent: ${INTENT} · agent v${VERSION}_"
            echo
            echo "$ANSWER"
            echo
            echo "---"
            echo "_Synthetic workspace data. Source: live agent /invocations._"
          } >> "$GITHUB_STEP_SUMMARY"
