# Verify Atlassian credentials + list what the agent will see.
# Run manually: Actions > "Verify Atlassian" > Run workflow.
# Needs repo secrets: ATLASSIAN_SITE, ATLASSIAN_EMAIL, ATLASSIAN_TOKEN.

name: Verify Atlassian

on:
  workflow_dispatch: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Who am I (token check, with diagnostics)
        run: |
          SITE="${{ secrets.ATLASSIAN_SITE }}"
          EMAIL="${{ secrets.ATLASSIAN_EMAIL }}"
          TOKEN="${{ secrets.ATLASSIAN_TOKEN }}"
          # which secrets are present? (lengths only, never values)
          echo "ATLASSIAN_SITE  length: ${#SITE}  (expect ~30, starts with https)"
          echo "ATLASSIAN_EMAIL length: ${#EMAIL} (expect ~20)"
          echo "ATLASSIAN_TOKEN length: ${#TOKEN} (expect ~190+)"
          [ -n "$SITE" ] && [ -n "$EMAIL" ] && [ -n "$TOKEN" ] || { echo "::error::A secret is EMPTY or misnamed - names must be exactly ATLASSIAN_SITE, ATLASSIAN_EMAIL, ATLASSIAN_TOKEN"; exit 1; }
          SITE="${SITE%/}"
          CODE=$(curl -s -o /tmp/resp.json -w "%{http_code}" -u "$EMAIL:$TOKEN" "$SITE/rest/api/3/myself")
          echo "HTTP $CODE from $SITE/rest/api/3/myself"
          case "$CODE" in
            200) jq '{displayName, emailAddress, accountType}' /tmp/resp.json ;;
            401) echo "::error::401 Unauthorized - email/token pair rejected. Re-check ATLASSIAN_EMAIL is the Atlassian signup email and the token was pasted completely (they are long!)."; exit 1 ;;
            404|000) echo "::error::Site unreachable - ATLASSIAN_SITE should look like https://yoursite.atlassian.net (no path). Got HTTP $CODE."; exit 1 ;;
            *) echo "::error::Unexpected HTTP $CODE"; head -c 300 /tmp/resp.json; exit 1 ;;
          esac

      - name: Jira projects visible
        run: |
          curl -sf -u "${{ secrets.ATLASSIAN_EMAIL }}:${{ secrets.ATLASSIAN_TOKEN }}" \
            "${{ secrets.ATLASSIAN_SITE }}/rest/api/3/project/search" \
            | jq -r '.values[]? | "\(.key)\t\(.name)"' || echo "(no projects yet - create one in the Jira UI)"

      - name: Confluence spaces visible
        run: |
          curl -sf -u "${{ secrets.ATLASSIAN_EMAIL }}:${{ secrets.ATLASSIAN_TOKEN }}" \
            "${{ secrets.ATLASSIAN_SITE }}/wiki/api/v2/spaces" \
            | jq -r '.results[]? | "\(.key)\t\(.name)"' || echo "(no spaces yet - create one in the Confluence UI)"
