# Manual diagnosis: fetch runtime logs + live-test the agent endpoint.
# Run from GitHub: Actions > "Debug agent" > Run workflow.
# Our dev sandbox cannot reach vngcloud.vn, so GitHub's runners are our hands.

name: Debug agent

on:
  workflow_dispatch: {}

env:
  RUNTIME_NAME: lending-watchdog
  IAM_TOKEN_URL: https://iam.api.vngcloud.vn/accounts-api/v2/auth/token
  RUNTIME_API: https://agentbase.api.vngcloud.vn/runtime
  LLM_BASE_URL: https://maas-llm-aiplatform-hcm.api.vngcloud.vn/v1

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Get IAM token
        id: token
        run: |
          TOKEN=$(curl -sf -X POST "$IAM_TOKEN_URL" \
            -u "${{ secrets.GREENNODE_CLIENT_ID }}:${{ secrets.GREENNODE_CLIENT_SECRET }}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" | jq -r '.access_token')
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Runtime status + recent logs
        run: |
          AUTH="Authorization: Bearer ${{ steps.token.outputs.token }}"
          ID=$(curl -sf -H "$AUTH" "$RUNTIME_API/agent-runtimes?page=1&size=50" \
            | jq -r --arg n "$RUNTIME_NAME" '.listData[]? | select(.name == $n) | .id' | head -1)
          echo "Runtime ID: $ID"
          curl -sf -H "$AUTH" "$RUNTIME_API/agent-runtimes/$ID" | jq '{status, statusReason, updatedAt}'
          echo "================ RECENT LOGS (last 200 lines) ================"
          curl -sf -X POST -H "$AUTH" -H "Content-Type: application/json" \
            -d '{"from": 0, "limit": 200}' \
            "$RUNTIME_API/agent-runtimes/$ID/logs" | jq -r '.. | .message? // empty' | tail -120
          echo "ID=$ID" >> "$GITHUB_ENV"

      - name: Live-test the endpoint
        run: |
          AUTH="Authorization: Bearer ${{ steps.token.outputs.token }}"
          URL=$(curl -sf -H "$AUTH" "$RUNTIME_API/agent-runtimes/$ID/endpoints" \
            | jq -r '.listData[]? // .[]? | select(.url) | .url' | head -1)
          echo "Endpoint: $URL"
          ask () {
            echo "---- Q: $1"
            T0=$(date +%s)
            HTTP=$(curl -s -m 60 -o /tmp/resp.json -w "%{http_code}" -X POST "$URL/invocations" \
              -H "Content-Type: application/json" -d "{\"message\": \"$1\"}")
            echo "HTTP $HTTP in $(( $(date +%s) - T0 ))s"
            head -c 1500 /tmp/resp.json; echo
          }
          ask "portfolio summary"
          ask "tuan nay co gi dang lo"
          ask "give me the weekly report"
          echo "================ LOGS AFTER TESTS ================"
          curl -sf -X POST -H "$AUTH" -H "Content-Type: application/json" \
            -d '{"from": 0, "limit": 100}' \
            "$RUNTIME_API/agent-runtimes/$ID/logs" | jq -r '.. | .message? // empty' | tail -60

      - name: CORS check (can browsers call the endpoint for chat.html?)
        run: |
          AUTH="Authorization: Bearer ${{ steps.token.outputs.token }}"
          URL=$(curl -sf -H "$AUTH" "$RUNTIME_API/agent-runtimes/$ID/endpoints" \
            | jq -r '.listData[]? // .[]? | select(.url) | .url' | head -1)
          echo "--- OPTIONS preflight (what a browser sends first):"
          curl -s -D - -o /dev/null -m 15 -X OPTIONS "$URL/invocations" \
            -H "Origin: https://bichtram-0701.github.io" \
            -H "Access-Control-Request-Method: POST" \
            -H "Access-Control-Request-Headers: content-type" | head -20
          echo "--- POST response headers:"
          curl -s -D - -o /dev/null -m 30 -X POST "$URL/invocations" \
            -H "Origin: https://bichtram-0701.github.io" -H "Content-Type: application/json" \
            -d '{"message": "hi"}' | head -20
          echo "VERDICT: if you see 'access-control-allow-origin' above, chat.html will work in browsers."

      - name: Direct MaaS sanity check (is the LLM key/model OK?)
        run: |
          KEY="${{ secrets.LLM_API_KEY }}"
          echo "models visible with team key:"
          curl -s -m 20 -H "Authorization: Bearer $KEY" "$LLM_BASE_URL/models" | head -c 800; echo
          MODEL=$(curl -s -m 20 -H "Authorization: Bearer $KEY" "$LLM_BASE_URL/models" | jq -r '[.data[]?.id] | map(select(test("(?i)qwen"))) + . | first // empty')
          echo "trying chat completion on: $MODEL"
          T0=$(date +%s)
          curl -s -m 55 -H "Authorization: Bearer $KEY" -H "Content-Type: application/json" \
            -d "{\"model\": \"$MODEL\", \"max_tokens\": 40, \"messages\": [{\"role\": \"user\", \"content\": \"Say OK\"}]}" \
            "$LLM_BASE_URL/chat/completions" | head -c 600
          echo; echo "LLM round-trip: $(( $(date +%s) - T0 ))s"
